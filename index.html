<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.2em;
      color: #4ecca3;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
    }

    #scoreboard {
      display: flex;
      gap: 3rem;
      margin-bottom: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #4ecca3;
    }

    #game-container {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #4ecca3;
      box-shadow: 0 0 30px rgba(78, 204, 163, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5);
      background: #0d0d1a;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13, 13, 26, 0.88);
      border-radius: 2px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #4ecca3;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    #overlay p {
      color: #aaa;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    #overlay .final-score {
      font-size: 1.1rem;
      color: #e0e0e0;
      margin-bottom: 1.5rem;
    }

    button {
      background: transparent;
      border: 2px solid #4ecca3;
      color: #4ecca3;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      font-family: inherit;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #4ecca3;
      color: #0d0d1a;
    }

    #controls {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      line-height: 1.8;
    }

    #speed-select {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #speed-select label {
      font-size: 0.8rem;
      color: #888;
    }

    #speed-select select {
      background: #0d0d1a;
      border: 1px solid #4ecca3;
      color: #4ecca3;
      padding: 0.2rem 0.5rem;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Mobile D-Pad */
    #dpad {
      display: none;
      margin-top: 1.5rem;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      grid-template-columns: repeat(3, 3rem);
      grid-template-rows: repeat(3, 3rem);
      gap: 0.3rem;
    }

    @media (pointer: coarse) {
      #dpad { display: grid; }
      #controls { display: none; }
    }

    .dpad-btn {
      width: 3rem;
      height: 3rem;
      padding: 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dpad-btn.up    { grid-area: up; }
    .dpad-btn.left  { grid-area: left; }
    .dpad-btn.right { grid-area: right; }
    .dpad-btn.down  { grid-area: down; }
  </style>
</head>
<body>
  <h1>SNAKE</h1>

  <div id="scoreboard">
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Highscore</div>
      <div class="score-value" id="highscore">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Level</div>
      <div class="score-value" id="level">1</div>
    </div>
  </div>

  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>

    <div id="overlay">
      <h2>SNAKE</h2>
      <p>Benutze die Pfeiltasten oder WASD</p>
      <div id="speed-select">
        <label for="speed">Schwierigkeit:</label>
        <select id="speed">
          <option value="120">Langsam</option>
          <option value="80" selected>Normal</option>
          <option value="50">Schnell</option>
          <option value="30">Extrem</option>
        </select>
      </div>
      <br/>
      <button id="start-btn">STARTEN</button>
    </div>
  </div>

  <div id="dpad">
    <button class="dpad-btn up"    data-dir="UP">▲</button>
    <button class="dpad-btn left"  data-dir="LEFT">◀</button>
    <button class="dpad-btn right" data-dir="RIGHT">▶</button>
    <button class="dpad-btn down"  data-dir="DOWN">▼</button>
  </div>

  <div id="controls">
    Pfeiltasten / WASD zum Steuern &nbsp;·&nbsp; P zum Pausieren
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('highscore');
    const levelEl = document.getElementById('level');
    const speedSelect = document.getElementById('speed');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, bonus, score, highscore, level, paused, gameLoop, baseInterval, bonusTimer;

    highscore = parseInt(localStorage.getItem('snakeHighscore') || '0');
    highscoreEl.textContent = highscore;

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomCell(exclude = []) {
      let cell;
      do {
        cell = { x: rand(0, COLS - 1), y: rand(0, ROWS - 1) };
      } while (exclude.some(e => e.x === cell.x && e.y === cell.y));
      return cell;
    }

    function spawnFood() {
      food = randomCell(snake);
    }

    function spawnBonus() {
      bonus = { ...randomCell([...snake, food]), timer: 7000 };
      bonusTimer = setTimeout(() => { bonus = null; }, bonus.timer);
    }

    function initGame() {
      const mid = Math.floor(COLS / 2);
      snake = [
        { x: mid, y: Math.floor(ROWS / 2) },
        { x: mid - 1, y: Math.floor(ROWS / 2) },
        { x: mid - 2, y: Math.floor(ROWS / 2) },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      paused = false;
      bonus = null;
      clearTimeout(bonusTimer);
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      spawnFood();
    }

    function drawCell(x, y, color, glow = false) {
      if (glow) {
        ctx.shadowBlur = 12;
        ctx.shadowColor = color;
      }
      ctx.fillStyle = color;
      ctx.fillRect(x * GRID + 1, y * GRID + 1, GRID - 2, GRID - 2);
      ctx.shadowBlur = 0;
    }

    function drawRoundedCell(x, y, color, glowColor) {
      const r = 4;
      const px = x * GRID + 1;
      const py = y * GRID + 1;
      const size = GRID - 2;
      ctx.beginPath();
      ctx.roundRect(px, py, size, size, r);
      ctx.fillStyle = color;
      if (glowColor) {
        ctx.shadowBlur = 14;
        ctx.shadowColor = glowColor;
      }
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
      }

      // Bonus food
      if (bonus) {
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 150);
        drawRoundedCell(bonus.x, bonus.y, `rgba(255, 200, 50, ${pulse})`, '#ffcc32');
      }

      // Food
      drawRoundedCell(food.x, food.y, '#ff4d6d', '#ff4d6d');

      // Snake body
      for (let i = snake.length - 1; i >= 0; i--) {
        const t = 1 - i / snake.length;
        const g = Math.floor(160 + 44 * t);
        const b = Math.floor(100 + 63 * t);
        drawRoundedCell(snake[i].x, snake[i].y, `rgb(30, ${g}, ${b})`, i === 0 ? '#4ecca3' : null);
      }

      // Eyes on head
      const head = snake[0];
      ctx.fillStyle = '#0d0d1a';
      const eyeOffset = GRID * 0.25;
      const eyeSize = 3;
      let e1, e2;
      if (dir.x === 1)       { e1 = [head.x * GRID + 13, head.y * GRID + 5];  e2 = [head.x * GRID + 13, head.y * GRID + 13]; }
      else if (dir.x === -1) { e1 = [head.x * GRID + 5,  head.y * GRID + 5];  e2 = [head.x * GRID + 5,  head.y * GRID + 13]; }
      else if (dir.y === -1) { e1 = [head.x * GRID + 5,  head.y * GRID + 5];  e2 = [head.x * GRID + 13, head.y * GRID + 5]; }
      else                   { e1 = [head.x * GRID + 5,  head.y * GRID + 13]; e2 = [head.x * GRID + 13, head.y * GRID + 13]; }
      ctx.fillRect(e1[0], e1[1], eyeSize, eyeSize);
      ctx.fillRect(e2[0], e2[1], eyeSize, eyeSize);
    }

    function tick() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      let grew = false;
      if (head.x === food.x && head.y === food.y) {
        score += level * 10;
        grew = true;
        spawnFood();
        if (score >= level * 50) {
          level++;
          levelEl.textContent = level;
          clearInterval(gameLoop);
          const interval = Math.max(30, parseInt(speedSelect.value) - (level - 1) * 8);
          gameLoop = setInterval(tick, interval);
        }
        if (Math.random() < 0.25 && !bonus) spawnBonus();
      } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
        score += level * 30;
        grew = true;
        clearTimeout(bonusTimer);
        bonus = null;
      }

      if (!grew) snake.pop();

      scoreEl.textContent = score;
      if (score > highscore) {
        highscore = score;
        highscoreEl.textContent = highscore;
        localStorage.setItem('snakeHighscore', highscore);
      }

      draw();
    }

    function startGame() {
      initGame();
      overlay.style.display = 'none';
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, parseInt(speedSelect.value));
      draw();
    }

    function endGame() {
      clearInterval(gameLoop);
      clearTimeout(bonusTimer);

      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <h2>GAME OVER</h2>
        <div class="final-score">Score: <strong>${score}</strong> &nbsp;·&nbsp; Level: <strong>${level}</strong></div>
        ${score >= highscore && score > 0 ? '<p style="color:#ffcc32">Neuer Highscore!</p>' : '<p>Versuche es nochmal!</p>'}
        <button id="start-btn">NOCHMAL</button>
      `;
      document.getElementById('start-btn').addEventListener('click', startGame);
    }

    // Input handling
    const keyMap = {
      ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
      w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT',
      W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT',
    };

    function applyDir(action) {
      if (action === 'UP'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
      if (action === 'DOWN'  && dir.y !== -1) nextDir = { x: 0, y: 1 };
      if (action === 'LEFT'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
      if (action === 'RIGHT' && dir.x !== -1) nextDir = { x: 1, y: 0 };
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        if (!gameLoop) return;
        if (paused) {
          gameLoop = setInterval(tick, Math.max(30, parseInt(speedSelect.value) - (level - 1) * 8));
        } else {
          clearInterval(gameLoop);
          gameLoop = null;
        }
        paused = !paused;
        return;
      }
      const action = keyMap[e.key];
      if (action) { e.preventDefault(); applyDir(action); }
    });

    document.querySelectorAll('.dpad-btn').forEach(btn => {
      btn.addEventListener('click', () => applyDir(btn.dataset.dir));
    });

    // Touch swipe support
    let touchStart = null;
    canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.clientX;
      const dy = e.changedTouches[0].clientY - touchStart.clientY;
      if (Math.abs(dx) > Math.abs(dy)) {
        applyDir(dx > 0 ? 'RIGHT' : 'LEFT');
      } else {
        applyDir(dy > 0 ? 'DOWN' : 'UP');
      }
      touchStart = null;
    }, { passive: true });

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
